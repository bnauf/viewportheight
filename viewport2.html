<! DOCTYPE html>
<html>
    <head>
        <title></title>
        <style>
            body{
                height:100vh
            }
            .vh{
                background-color:green;
                height:100vh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:calc(32px + 2dvh);
                position:relative 
            }
            .svh{
                background-color:cyan;
                height:100svh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:calc(32px + 2dvh);
                position:relative
            }
            .lvh{
                background-color:red;
                height:100lvh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:calc(32px + 2dvh);
                position:relative 
            }
            .dvh{
                background-color:blue;
                height:100dvh;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:calc(32px + 2dvh);
                position:relative 
            }
            .top{
                position:absolute;
                top:-50px
            }
            .bottom{
                position:absolute;
                bottom:-50px
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="svh">
                <p class="top">ismail</p>
                <p>small(svh)</p>
                <p class="bottom">kawu</p>
                </div>
            <div class="vh">
                <p class="top">ismail</p>
                <p>viewport(vh)</p>
                <p class="bottom">kawu</p>
                </div>
            <div class="lvh">
                <p class="top">ismail</p>
                <p>large(lvh)</p>
                <p class="bottom">kawu</p>
                </div>
            <div class="dvh">
                <p class="top">ismail</p>
                <p>dynamic(dvh)</p>
                <p class="bottom">kawu</p>
                </div>
        </div>
    </body>
</html>
